<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Life After Survivor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: #f5f3fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: white;
      border-radius: 4px;
      padding: 64px 56px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(10,5,26,0.08);
      border-top: 3px solid #f68916;
    }
    .icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #c8b8e8, #4b389b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 1.8rem; color: white;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 500;
      color: #1a0f3a; margin-bottom: 16px;
    }
    p {
      font-size: 0.95rem; font-weight: 300;
      color: #4a3a6a; line-height: 1.8;
      margin-bottom: 36px;
    }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: #4b389b; color: white;
      border-radius: 2px; text-decoration: none;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: background 0.2s;
    }
    a:hover { background: #f68916; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Message received.</h1>
    <p>Thank you for reaching out. A care coordinator will be in touch within one business day to discuss how Life After Survivor can support your recovery.</p>
    <a href="/">Return to site</a>
  </div>
</body>
</html>
